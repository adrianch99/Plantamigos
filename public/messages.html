<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes — PlantaMigos</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>

  <!-- ===== NAVBAR SUPERIOR (siempre visible) ===== -->
  <nav class="navbar">
    <!-- Menú hamburguesa (solo móvil) -->
    <button class="navbar-hamburger" id="navbar-hamburger" aria-label="Menú">
      <i class="fa-solid fa-bars"></i>
    </button>

    <a href="/" class="navbar-brand">
      <span class="leaf-icon"><i class="fa-solid fa-seedling" style="color: rgb(45, 66, 54);"></i></span>PlantaMigos
    </a>

    <!-- Enlaces del navbar superior (se ocultan en móvil) -->
    <div class="navbar-links" id="navbar-links">
      <a href="/" class="nav-link active">
        <span class="nav-link-icon"><i class="fa-solid fa-location-dot" style="color: rgb(45, 66, 54);"></i></span>
        <span class="nav-link-label">Mapa</span>
      </a>
      <a href="/feed.html" class="nav-link">
        <span class="nav-link-icon"><i class="fa-solid fa-users"></i></span>
        <span class="nav-link-label">Comunidad</span>
      </a>
      <a href="/messages.html" class="nav-link" id="nav-messages-link">
        <span class="nav-link-icon"><i class="fa-solid fa-paper-plane fa-rotate-by"
            style="color: rgb(45, 66, 54); --fa-rotate-angle: 48deg;"></i></span>
        <span class="nav-link-label">Mensajes</span>
        <span class="nav-badge" id="unread-badge" style="display:none">0</span>
      </a>
    </div>

    <div class="navbar-auth" id="nav-auth">
      <a href="/login.html" class="btn btn-outline btn-sm">Iniciar sesión</a>
      <a href="/login.html?tab=register" class="btn btn-primary btn-sm">Registrarse</a>
    </div>
  </nav>

  <!-- ===== NAVBAR INFERIOR (solo móvil, fijo abajo) ===== -->
  <nav class="navbar-bottom" id="navbar-bottom">
    <a href="/" class="nav-link-bottom active">
      <span class="nav-link-icon"><i class="fa-solid fa-location-dot"></i></span>
      <span class="nav-link-label">Mapa</span>
    </a>
    <a href="/feed.html" class="nav-link-bottom">
      <span class="nav-link-icon"><i class="fa-solid fa-users"></i></span>
      <span class="nav-link-label">Comunidad</span>
    </a>
    <a href="/messages.html" class="nav-link-bottom" id="bottom-messages-link">
      <span class="nav-link-icon"><i class="fa-solid fa-paper-plane fa-rotate-by"
          style="--fa-rotate-angle: 48deg;"></i></span>
      <span class="nav-link-label">Mensajes</span>
      <span class="nav-badge" id="bottom-unread-badge" style="display:none">0</span>
    </a>
  </nav>

  <!-- ===== MENÚ HAMBURGUESA (desplegable) ===== -->
  <div class="hamburger-menu" id="hamburger-menu">
    <div class="hamburger-menu-inner">
      <button class="hamburger-close" id="hamburger-close"><i class="fa-solid fa-xmark"></i></button>
      <a href="/" class="hamburger-link active"><i class="fa-solid fa-location-dot"></i> Mapa</a>
      <a href="/feed.html" class="hamburger-link"><i class="fa-solid fa-users"></i> Comunidad</a>
      <a href="/messages.html" class="hamburger-link"><i class="fa-solid fa-paper-plane"></i> Mensajes</a>
      <hr>
      <a href="/profile.html" class="hamburger-link" id="hamburger-profile" style="display:none;"><i class="fa-solid fa-user"></i> Mi perfil</a>
      <a href="/login.html" class="hamburger-link" id="hamburger-login"><i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión</a>
      <a href="/login.html?tab=register" class="hamburger-link" id="hamburger-register"><i class="fa-solid fa-user-plus"></i> Registrarse</a>
      <button class="hamburger-link" id="hamburger-logout"
        style="background:none;border:none;text-align:left;width:100%;display:none;"><i
          class="fa-solid fa-arrow-right-from-bracket"></i> Salir</button>
      
      <!-- Social Media Section -->
      <hr>
      <div class="hamburger-social-section">
        <p class="hamburger-social-title">Síguenos en</p>
        <div class="hamburger-social-links">
          <a href="https://www.facebook.com/profile.php?id=61591070627216" class="hamburger-social-link" title="Facebook">
            <i class="fa-brands fa-facebook-f"></i>
          </a>
          <a href="https://www.instagram.com/plant.amigos?igsh=MTY1ZnhuaXB1bDJu" class="hamburger-social-link" title="Instagram">
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a href="https://www.threads.com/@plant.amigos" class="hamburger-social-link" title="Threads">
            <i class="fa-brands fa-threads"></i>
          </a>
          <a href="https://tiktok.com/@plant.amigos" class="hamburger-social-link" title="TikTok">
            <i class="fa-brands fa-tiktok"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="page" style="height:100vh;overflow:hidden;">
    <div class="messages-layout">
      <!-- Conversations Panel -->
      <div class="conversations-panel">
        <div class="conversations-header">Conversaciones</div>
        <div id="conversations-list">
          <div style="text-align:center;padding:24px;"><span class="spinner"></span></div>
        </div>
      </div>

      <!-- Chat Panel -->
      <div class="chat-panel" id="chat-panel">
        <div class="chat-empty" id="chat-empty">
          <span style="font-size:4rem;"><i class="fa-solid fa-seedling" style="color: rgb(45, 66, 54);"></i></span>
          <p>Selecciona una conversación</p>
          <p style="font-size:0.75rem;color:var(--text-dim);">o contacta a alguien desde el mapa</p>
        </div>

        <!-- Chat header (hidden until chat opened) -->
        <div class="chat-header" id="chat-header" style="display:none; align-items:center;">
          <button id="chat-back-btn" class="btn btn-outline btn-sm"
            style="margin-right: 12px; padding: 6px 12px; font-weight: bold;">← Volver</button>
          <div id="chat-with-avatar"></div>
          <div>
            <div id="chat-with-name" style="font-weight:700;"></div>
            <a id="chat-with-profile" href="#" style="font-size:0.75rem;color:var(--green-light);">Ver perfil</a>
          </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages" style="display:none;"></div>

        <!-- Input -->
        <div class="chat-input" id="chat-input-bar" style="display:none;">
          <input type="text" id="message-input" class="form-control" placeholder="Escribe un mensaje... 🌿"
            autocomplete="off">
          <button class="btn btn-primary" id="btn-send-message">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let currentChatUserId = null;
    let pollInterval = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!getToken()) { window.location.href = '/login.html'; return; }
      updateNavbar();
      if (typeof setBottomNavActive === 'function') setBottomNavActive();
      await loadConversations();

      // Check URL params (coming from map/profile)
      const params = new URLSearchParams(location.search);
      const withId = params.get('with');
      const withName = params.get('name');
      if (withId) openChat(parseInt(withId), withName || 'Usuario');

      // Send message
      document.getElementById('btn-send-message').addEventListener('click', sendMessage);
      document.getElementById('message-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });

      // Back button click handler for responsive layout
      document.getElementById('chat-back-btn').addEventListener('click', () => {
        document.querySelector('.messages-layout').classList.remove('chat-active');
        currentChatUserId = null;
        if (pollInterval) clearInterval(pollInterval);
      });

      // Hamburguesa
      const hamburgerBtn = document.getElementById('navbar-hamburger');
      const hamburgerMenu = document.getElementById('hamburger-menu');
      const hamburgerClose = document.getElementById('hamburger-close');
      
      if (hamburgerBtn && hamburgerMenu && hamburgerClose) {
        hamburgerBtn.addEventListener('click', () => {
          hamburgerMenu.classList.toggle('open');
        });
        hamburgerClose.addEventListener('click', () => {
          hamburgerMenu.classList.remove('open');
        });
        
        // Cerrar menú cuando se hace clic en el overlay
        hamburgerMenu.addEventListener('click', (e) => {
          if (e.target === hamburgerMenu) {
            hamburgerMenu.classList.remove('open');
          }
        });

        // Cerrar menú al hacer clic en un enlace
        document.querySelectorAll('.hamburger-link').forEach(link => {
          link.addEventListener('click', () => {
            hamburgerMenu.classList.remove('open');
          });
        });
      }
    });

    async function loadConversations() {
      try {
        const convs = await api.getConversations();
        const list = document.getElementById('conversations-list');
        if (!convs.length) {
          list.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>Sin conversaciones aún</p></div>`;
          return;
        }
        list.innerHTML = convs.map(c => `
          <div class="conversation-item ${currentChatUserId === c.other_id ? 'active' : ''}"
               onclick="openChat(${c.other_id},'${c.other_name}')"
               id="conv-${c.other_id}">
            ${avatarHTML({ avatar_url: c.other_avatar, name: c.other_name }, 40)}
            <div class="conv-info">
              <div class="conv-name">${c.other_name}</div>
              <div class="conv-last">${c.last_message || '...'}</div>
            </div>
            ${parseInt(c.unread) > 0 ? `<span class="nav-badge">${c.unread}</span>` : ''}
          </div>`).join('');
      } catch (err) {
        console.error(err);
      }
    }

    async function openChat(userId, userName) {
      currentChatUserId = userId;

      // Update UI
      document.querySelector('.messages-layout').classList.add('chat-active');
      document.getElementById('chat-empty').style.display = 'none';
      document.getElementById('chat-header').style.display = 'flex';
      document.getElementById('chat-messages').style.display = 'flex';
      document.getElementById('chat-input-bar').style.display = 'flex';

      document.getElementById('chat-with-name').textContent = userName;
      document.getElementById('chat-with-profile').href = `/profile.html?id=${userId}`;
      document.getElementById('chat-with-avatar').innerHTML = avatarHTML({ name: userName }, 38);

      // Highlight conversation
      document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`conv-${userId}`)?.classList.add('active');

      await loadMessages();

      // Start polling
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(loadMessages, 4000);
    }

    async function loadMessages() {
      if (!currentChatUserId) return;
      try {
        const messages = await api.getMessages(currentChatUserId);
        const me = getUser();
        const container = document.getElementById('chat-messages');
        const wasAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;

        container.innerHTML = messages.length
          ? messages.map(m => {
            const isSent = m.from_user === me.id;
            return `<div style="display:flex;flex-direction:column;align-items:${isSent ? 'flex-end' : 'flex-start'};">
                <div class="message-bubble ${isSent ? 'sent' : 'received'}">${m.content}</div>
                <div class="message-time" style="align-self:${isSent ? 'flex-end' : 'flex-start'}">${timeAgo(m.created_at)}</div>
              </div>`;
          }).join('')
          : `<div class="chat-empty"><span style="font-size:2rem;">🌱</span><p>¡Empieza la conversación!</p></div>`;

        if (wasAtBottom || messages.length < 5) {
          container.scrollTop = container.scrollHeight;
        }
      } catch { }
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const content = input.value.trim();
      if (!content || !currentChatUserId) return;
      input.value = '';
      try {
        await api.sendMessage({ to_user: currentChatUserId, content });
        await loadMessages();
        await loadConversations();
      } catch (err) {
        showToast(err.message, 'error');
        input.value = content;
      }
    }

    function updateNavbar() {
      const user = getUser();
      const navAuth = document.getElementById('nav-auth');
      const hamburgerProfile = document.getElementById('hamburger-profile');
      const hamburgerLogin = document.getElementById('hamburger-login');
      const hamburgerRegister = document.getElementById('hamburger-register');
      const hamburgerLogout = document.getElementById('hamburger-logout');
      
      if (user) {
        // Usuario logueado
        if (navAuth) {
          navAuth.innerHTML = `
            <a href="/profile.html" class="navbar-user">
              ${avatarHTML(user, 30)}
              <span class="navbar-user-label">Ver perfil</span>
            </a>
            <button class="btn btn-ghost btn-sm navbar-logout" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket" style="color: rgb(45, 66, 54);"></i>Salir</button>`;
        }
        if (hamburgerProfile) hamburgerProfile.style.display = 'block';
        if (hamburgerLogin) hamburgerLogin.style.display = 'none';
        if (hamburgerRegister) hamburgerRegister.style.display = 'none';
        if (hamburgerLogout) {
          hamburgerLogout.style.display = 'block';
          hamburgerLogout.onclick = logout;
        }
      } else {
        // Usuario no logueado
        if (navAuth) navAuth.innerHTML = `
          <a href="/login.html" class="btn btn-outline btn-sm">Iniciar sesión</a>
          <a href="/login.html?tab=register" class="btn btn-primary btn-sm">Registrarse</a>`;
        if (hamburgerProfile) hamburgerProfile.style.display = 'none';
        if (hamburgerLogin) hamburgerLogin.style.display = 'block';
        if (hamburgerRegister) hamburgerRegister.style.display = 'block';
        if (hamburgerLogout) hamburgerLogout.style.display = 'none';
      }
    }

  </script>
</body>

</html>
