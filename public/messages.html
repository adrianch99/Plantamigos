<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes — PlantaMigos</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <nav class="navbar">
    <a href="/" class="navbar-brand">PlantaMigos</a>
    <div class="navbar-links">
      <a href="/" class="nav-link">Mapa</a>
      <a href="/feed.html" class="nav-link">Comunidad</a>
      <a href="/messages.html" class="nav-link active">Mensajes</a>
    </div>
    <div class="navbar-auth" id="nav-auth"></div>
  </nav>

  <div class="page" style="height:100vh;overflow:hidden;">
    <div class="messages-layout">
      <!-- Conversations Panel -->
      <div class="conversations-panel">
        <div class="conversations-header">Conversaciones</div>
        <div id="conversations-list">
          <div style="text-align:center;padding:24px;"><span class="spinner"></span></div>
        </div>
      </div>

      <!-- Chat Panel -->
      <div class="chat-panel" id="chat-panel">
        <div class="chat-empty" id="chat-empty">
          <span style="font-size:3rem;">🌿</span>
          <p>Selecciona una conversación</p>
          <p style="font-size:0.75rem;color:var(--text-dim);">o contacta a alguien desde el mapa</p>
        </div>

        <!-- Chat header (hidden until chat opened) -->
        <div class="chat-header" id="chat-header" style="display:none; align-items:center;">
          <button id="chat-back-btn" class="btn btn-outline btn-sm"
            style="margin-right: 12px; padding: 6px 12px; font-weight: bold;">← Volver</button>
          <div id="chat-with-avatar"></div>
          <div>
            <div id="chat-with-name" style="font-weight:700;"></div>
            <a id="chat-with-profile" href="#" style="font-size:0.75rem;color:var(--green-light);">Ver perfil</a>
          </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages" style="display:none;"></div>

        <!-- Input -->
        <div class="chat-input" id="chat-input-bar" style="display:none;">
          <input type="text" id="message-input" class="form-control" placeholder="Escribe un mensaje... 🌿"
            autocomplete="off">
          <button class="btn btn-primary" id="btn-send-message">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let currentChatUserId = null;
    let pollInterval = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!getToken()) { window.location.href = '/login.html'; return; }
      updateNavbar();
      await loadConversations();

      // Check URL params (coming from map/profile)
      const params = new URLSearchParams(location.search);
      const withId = params.get('with');
      const withName = params.get('name');
      if (withId) openChat(parseInt(withId), withName || 'Usuario');

      // Send message
      document.getElementById('btn-send-message').addEventListener('click', sendMessage);
      document.getElementById('message-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });

      // Back button click handler for responsive layout
      document.getElementById('chat-back-btn').addEventListener('click', () => {
        document.querySelector('.messages-layout').classList.remove('chat-active');
        currentChatUserId = null;
        if (pollInterval) clearInterval(pollInterval);
      });
    });

    async function loadConversations() {
      try {
        const convs = await api.getConversations();
        const list = document.getElementById('conversations-list');
        if (!convs.length) {
          list.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>Sin conversaciones aún</p></div>`;
          return;
        }
        list.innerHTML = convs.map(c => `
          <div class="conversation-item ${currentChatUserId === c.other_id ? 'active' : ''}"
               onclick="openChat(${c.other_id},'${c.other_name}')"
               id="conv-${c.other_id}">
            ${avatarHTML({ avatar_url: c.other_avatar, name: c.other_name }, 40)}
            <div class="conv-info">
              <div class="conv-name">${c.other_name}</div>
              <div class="conv-last">${c.last_message || '...'}</div>
            </div>
            ${parseInt(c.unread) > 0 ? `<span class="nav-badge">${c.unread}</span>` : ''}
          </div>`).join('');
      } catch (err) {
        console.error(err);
      }
    }

    async function openChat(userId, userName) {
      currentChatUserId = userId;

      // Update UI
      document.querySelector('.messages-layout').classList.add('chat-active');
      document.getElementById('chat-empty').style.display = 'none';
      document.getElementById('chat-header').style.display = 'flex';
      document.getElementById('chat-messages').style.display = 'flex';
      document.getElementById('chat-input-bar').style.display = 'flex';

      document.getElementById('chat-with-name').textContent = userName;
      document.getElementById('chat-with-profile').href = `/profile.html?id=${userId}`;
      document.getElementById('chat-with-avatar').innerHTML = avatarHTML({ name: userName }, 38);

      // Highlight conversation
      document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`conv-${userId}`)?.classList.add('active');

      await loadMessages();

      // Start polling
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(loadMessages, 4000);
    }

    async function loadMessages() {
      if (!currentChatUserId) return;
      try {
        const messages = await api.getMessages(currentChatUserId);
        const me = getUser();
        const container = document.getElementById('chat-messages');
        const wasAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;

        container.innerHTML = messages.length
          ? messages.map(m => {
            const isSent = m.from_user === me.id;
            return `<div style="display:flex;flex-direction:column;align-items:${isSent ? 'flex-end' : 'flex-start'};">
                <div class="message-bubble ${isSent ? 'sent' : 'received'}">${m.content}</div>
                <div class="message-time" style="align-self:${isSent ? 'flex-end' : 'flex-start'}">${timeAgo(m.created_at)}</div>
              </div>`;
          }).join('')
          : `<div class="chat-empty"><span style="font-size:2rem;">🌱</span><p>¡Empieza la conversación!</p></div>`;

        if (wasAtBottom || messages.length < 5) {
          container.scrollTop = container.scrollHeight;
        }
      } catch { }
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const content = input.value.trim();
      if (!content || !currentChatUserId) return;
      input.value = '';
      try {
        await api.sendMessage({ to_user: currentChatUserId, content });
        await loadMessages();
        await loadConversations();
      } catch (err) {
        showToast(err.message, 'error');
        input.value = content;
      }
    }

    function updateNavbar() {
      const user = getUser();
      const navAuth = document.getElementById('nav-auth');
      if (user && navAuth) {
        navAuth.innerHTML = `
          <a href="/profile.html" class="navbar-user">
            ${avatarHTML(user, 30)}
            <span>${user.name.split(' ')[0]}</span>
          </a>
          <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>`;
      }
    }
  </script>
</body>

</html>
