<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — PlantaMigos</title>
  <meta name="description"
    content="Perfil de usuario en PlantaMigos. Ve las plantas, posts y contacta a este plantero.">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>

  <!-- ===== NAVBAR SUPERIOR (siempre visible) ===== -->
  <nav class="navbar">
    <!-- Menú hamburguesa (solo móvil) -->
    <button class="navbar-hamburger" id="navbar-hamburger" aria-label="Menú">
      <i class="fa-solid fa-bars"></i>
    </button>

    <a href="/" class="navbar-brand">
      <span class="leaf-icon"><i class="fa-solid fa-seedling" style="color: rgb(45, 66, 54);"></i></span>PlantaMigos
    </a>

    <!-- Enlaces del navbar superior (se ocultan en móvil) -->
    <div class="navbar-links" id="navbar-links">
      <a href="/" class="nav-link active">
        <span class="nav-link-icon"><i class="fa-solid fa-location-dot" style="color: rgb(45, 66, 54);"></i></span>
        <span class="nav-link-label">Mapa</span>
      </a>
      <a href="/feed.html" class="nav-link">
        <span class="nav-link-icon"><i class="fa-solid fa-users"></i></span>
        <span class="nav-link-label">Comunidad</span>
      </a>
      <a href="/messages.html" class="nav-link" id="nav-messages-link">
        <span class="nav-link-icon"><i class="fa-solid fa-paper-plane fa-rotate-by"
            style="color: rgb(45, 66, 54); --fa-rotate-angle: 48deg;"></i></span>
        <span class="nav-link-label">Mensajes</span>
        <span class="nav-badge" id="unread-badge" style="display:none">0</span>
      </a>
    </div>

    <div class="navbar-auth" id="nav-auth">
      <a href="/login.html" class="btn btn-outline btn-sm">Iniciar sesión</a>
      <a href="/login.html?tab=register" class="btn btn-primary btn-sm">Registrarse</a>
    </div>
  </nav>

  <!-- ===== NAVBAR INFERIOR (solo móvil, fijo abajo) ===== -->
  <nav class="navbar-bottom" id="navbar-bottom">
    <a href="/" class="nav-link-bottom active">
      <span class="nav-link-icon"><i class="fa-solid fa-location-dot"></i></span>
      <span class="nav-link-label">Mapa</span>
    </a>
    <a href="/feed.html" class="nav-link-bottom">
      <span class="nav-link-icon"><i class="fa-solid fa-users"></i></span>
      <span class="nav-link-label">Comunidad</span>
    </a>
    <a href="/messages.html" class="nav-link-bottom" id="bottom-messages-link">
      <span class="nav-link-icon"><i class="fa-solid fa-paper-plane fa-rotate-by"
          style="--fa-rotate-angle: 48deg;"></i></span>
      <span class="nav-link-label">Mensajes</span>
      <span class="nav-badge" id="bottom-unread-badge" style="display:none">0</span>
    </a>
  </nav>

  <!-- ===== MENÚ HAMBURGUESA (desplegable) ===== -->
  <div class="hamburger-menu" id="hamburger-menu">
    <div class="hamburger-menu-inner">
      <button class="hamburger-close" id="hamburger-close"><i class="fa-solid fa-xmark"></i></button>
      <a href="/" class="hamburger-link active"><i class="fa-solid fa-location-dot"></i> Mapa</a>
      <a href="/feed.html" class="hamburger-link"><i class="fa-solid fa-users"></i> Comunidad</a>
      <a href="/messages.html" class="hamburger-link"><i class="fa-solid fa-paper-plane"></i> Mensajes</a>
      <hr>
      <a href="/profile.html" class="hamburger-link" id="hamburger-profile" style="display:none;"><i class="fa-solid fa-user"></i> Mi perfil</a>
      <a href="/login.html" class="hamburger-link" id="hamburger-login"><i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión</a>
      <a href="/login.html?tab=register" class="hamburger-link" id="hamburger-register"><i class="fa-solid fa-user-plus"></i> Registrarse</a>
      <button class="hamburger-link" id="hamburger-logout"
        style="background:none;border:none;text-align:left;width:100%;display:none;"><i
          class="fa-solid fa-arrow-right-from-bracket"></i> Salir</button>
      
      <!-- Social Media Section -->
      <hr>
      <div class="hamburger-social-section">
        <p class="hamburger-social-title">Síguenos en</p>
        <div class="hamburger-social-links">
          <a href="https://www.facebook.com/profile.php?id=61591070627216" class="hamburger-social-link" title="Facebook">
            <i class="fa-brands fa-facebook-f"></i>
          </a>
          <a href="https://www.instagram.com/plant.amigos?igsh=MTY1ZnhuaXB1bDJu" class="hamburger-social-link" title="Instagram">
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a href="https://www.threads.com/@plant.amigos" class="hamburger-social-link" title="Threads">
            <i class="fa-brands fa-threads"></i>
          </a>
          <a href="https://tiktok.com/@plant.amigos" class="hamburger-social-link" title="TikTok">
            <i class="fa-brands fa-tiktok"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="page">
    <!-- PROFILE HEADER -->
    <div class="profile-header" id="profile-header-section">
      <div class="profile-avatar-wrap" id="profile-avatar">
        <div class="profile-avatar"
          style="display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:2rem;"><i
            class="fa-solid fa-seedling" style="color: rgb(45, 66, 54);"></i></div>
      </div>
      <div style="flex:1;">
        <h1 id="profile-name" style="font-size:1.5rem;font-weight:700;margin-bottom:4px;">Cargando...</h1>
        <p class="profile-location" id="profile-location"><i class="fa-solid fa-location-dot"
            style="color: rgb(45, 66, 54);"></i> ...</p>
        <p class="profile-bio" id="profile-bio"></p>
        <div class="profile-stats">
          <div class="profile-stat"><strong id="stat-plants">0</strong><span>Plantas</span></div>
          <div class="profile-stat"><strong id="stat-posts">0</strong><span>Posts</span></div>
          <div class="profile-stat"><strong id="profile-since">—</strong><span>Miembro desde</span></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" id="btn-edit-profile" style="display:none;">Editar perfil</button>
          <button class="btn btn-primary btn-sm" id="btn-add-plant" style="display:none;">Agregar planta</button>
          <button class="btn btn-primary btn-sm" id="btn-contact-user" style="display:none;">Contactar</button>
        </div>
      </div>
    </div>

    <!-- PROFILE BODY -->
    <div class="profile-body">
      <!-- Plants Section -->
      <section style="margin-bottom:32px;">
        <div class="section-header">
          <h2 class="section-title">Plantas</h2>
        </div>
        <div class="plants-grid" id="plants-grid">
          <div style="text-align:center;padding:24px;"><span class="spinner"></span></div>
        </div>
      </section>

      <!-- Posts Section -->
      <section>
        <div class="section-header">
          <h2 class="section-title">Publicaciones</h2>
        </div>
        <div id="user-posts">
          <div style="text-align:center;padding:24px;"><span class="spinner"></span></div>
        </div>
      </section>
    </div>
  </div>

  <div class="image-fullscreen-modal" id="image-fullscreen-modal">
    <div class="image-fullscreen-container">
      <div class="image-fullscreen-left">
        <button class="image-fullscreen-btn" id="image-fullscreen-close" title="Cerrar">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <img id="fullscreen-image" class="image-fullscreen-img" alt="Imagen ampliada">
      <div class="image-fullscreen-right">
        <button class="image-fullscreen-btn" id="image-fullscreen-download" title="Descargar">
          <i class="fa-solid fa-download"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL: Edit Profile -->
  <div class="modal-overlay" id="modal-edit-profile">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Editar perfil</h3>
        <button class="modal-close" onclick="closeModal('modal-edit-profile')">&times;</button>
      </div>
      <form id="form-edit-profile">
        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input type="text" id="edit-name" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Bio</label>
          <textarea id="edit-bio" class="form-control" placeholder="Cuéntanos sobre ti y tus plantas..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Foto de perfil</label>
          <input type="url" id="edit-avatar" class="form-control" placeholder="URL de imagen">
          <button type="button" id="btn-upload-profile-pic" class="btn btn-outline btn-sm" style="margin-top:6px;"><i
              class="fa-solid fa-camera" style="color: rgb(45, 66, 54);"></i>
            Subir foto</button>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Ciudad</label>
            <input type="text" id="edit-city" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Barrio</label>
            <input type="text" id="edit-neighborhood" class="form-control">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Calle</label>
          <input type="text" id="edit-street" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Guardar cambios</button>
      </form>
    </div>
  </div>

  <!-- MODAL: Add Plant -->
  <div class="modal-overlay" id="modal-add-plant">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Agregar planta</h3>
        <button class="modal-close" onclick="closeModal('modal-add-plant')">&times;</button>
      </div>
      <form id="form-add-plant">
        <div class="form-group">
          <label class="form-label">Nombre de la planta</label>
          <input type="text" id="plant-name" class="form-control" placeholder="ej. Pothos, Suculenta, Monstera..."
            required>
        </div>
        <div class="form-group">
          <label class="form-label">Descripción / Tip de cuidado</label>
          <textarea id="plant-description" class="form-control"
            placeholder="Estado, cuidados especiales, por qué la ofreces..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Imagen</label>
          <input type="hidden" id="plant-image-url">
          <button type="button" id="btn-plant-image" class="btn btn-outline btn-sm"><i class="fa-solid fa-camera"
              style="color: rgb(45, 66, 54);"></i>Subir imagen</button>
          <div id="plant-image-preview" style="margin-top:8px;"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Tipo</label>
            <select id="plant-type" class="form-control">
              <option value="offer">Ofrezco</option>
              <option value="want">Busco</option>
              <option value="tip">Tengo (tip)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Modalidad</label>
            <select id="plant-exchange" class="form-control">
              <option value="intercambio">Intercambio</option>
              <option value="regalo">Regalo</option>
              <option value="donacion">Donación</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Agregar planta</button>
      </form>
    </div>
  </div>

  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <script src="/js/api.js"></script>
  <script src="/js/profile.js"></script>
  <script>
    // Update navbar
    document.addEventListener('DOMContentLoaded', () => {
      const user = getUser();
      const navAuth = document.getElementById('nav-auth');
      const hamburgerProfile = document.getElementById('hamburger-profile');
      const hamburgerLogin = document.getElementById('hamburger-login');
      const hamburgerRegister = document.getElementById('hamburger-register');
      const hamburgerLogout = document.getElementById('hamburger-logout');
      
      if (user) {
        // Usuario logueado
        if (navAuth) {
          navAuth.innerHTML = `
            <a href="/profile.html" class="navbar-user">
              ${avatarHTML(user, 30)}
              <span class="navbar-user-label">Ver perfil</span>
            </a>
            <button class="btn btn-ghost btn-sm navbar-logout" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket" style="color: rgb(45, 66, 54);"></i>Salir</button>`;
        }
        if (hamburgerProfile) hamburgerProfile.style.display = 'block';
        if (hamburgerLogin) hamburgerLogin.style.display = 'none';
        if (hamburgerRegister) hamburgerRegister.style.display = 'none';
        if (hamburgerLogout) {
          hamburgerLogout.style.display = 'block';
          hamburgerLogout.onclick = logout;
        }
      } else {
        // Usuario no logueado
        if (navAuth) navAuth.innerHTML = `
          <a href="/login.html" class="btn btn-outline btn-sm">Iniciar sesión</a>
          <a href="/login.html?tab=register" class="btn btn-primary btn-sm">Registrarse</a>`;
        if (hamburgerProfile) hamburgerProfile.style.display = 'none';
        if (hamburgerLogin) hamburgerLogin.style.display = 'block';
        if (hamburgerRegister) hamburgerRegister.style.display = 'block';
        if (hamburgerLogout) hamburgerLogout.style.display = 'none';
      }

      // Hamburguesa
      const hamburgerBtn = document.getElementById('navbar-hamburger');
      const hamburgerMenu = document.getElementById('hamburger-menu');
      const hamburgerClose = document.getElementById('hamburger-close');
      
      if (hamburgerBtn && hamburgerMenu && hamburgerClose) {
        hamburgerBtn.addEventListener('click', () => {
          hamburgerMenu.classList.toggle('open');
        });
        hamburgerClose.addEventListener('click', () => {
          hamburgerMenu.classList.remove('open');
        });
        
        // Cerrar menú cuando se hace clic en el overlay
        hamburgerMenu.addEventListener('click', (e) => {
          if (e.target === hamburgerMenu) {
            hamburgerMenu.classList.remove('open');
          }
        });

        // Cerrar menú al hacer clic en un enlace
        document.querySelectorAll('.hamburger-link').forEach(link => {
          link.addEventListener('click', () => {
            hamburgerMenu.classList.remove('open');
          });
        });
      }
      if (typeof setBottomNavActive === 'function') setBottomNavActive();
    });
  </script>
</body>

</html>
