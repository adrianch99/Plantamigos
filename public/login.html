<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — PlantaMigos</title>
  <meta name="description"
    content="Únete a PlantaMigos. Regístrate e ingresa para conectar con amantes de las plantas en tu ciudad.">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>

  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="leaf-icon"><i class="fa-solid fa-seedling" style="color: rgb(45, 66, 54);"></i></span>PlantaMigos
    </a>
  </nav>

  <div class="auth-page page">
    <div class="card auth-card">
      <div class="card-body">
        <div class="auth-logo">
          <h1>PlantaMigos</h1>
          <p>La comunidad verde de tu ciudad</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab" data-tab="login-section" id="tab-login">Iniciar sesión</button>
          <button class="auth-tab active" data-tab="register-section" id="tab-register">Registrarse</button>
        </div>

        <!-- LOGIN SECTION -->
        <div class="auth-form" id="login-section">
          <form id="login-form">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="login-email" class="form-control" placeholder="tu@email.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">Contraseña</label>
              <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Ingresar</button>
          </form>
          <p style="text-align:center;margin-top:16px;font-size:0.8rem;color:var(--text-muted);">
            ¿No tienes cuenta?
            <button onclick="switchTab('register')"
              style="background:none;border:none;color:var(--text);cursor:pointer;font-weight:600;">Regístrate</button>
          </p>
        </div>

        <!-- REGISTER SECTION -->
        <div class="auth-form active" id="register-section">
          <form id="register-form">
            <div class="form-group">
              <label class="form-label">Tu nombre</label>
              <input type="text" id="reg-name" class="form-control" placeholder="Laura Flores" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="reg-email" class="form-control" placeholder="tu@email.com" required>
              </div>
              <div class="form-group">
                <label class="form-label">Contraseña</label>
                <input type="password" id="reg-password" class="form-control" placeholder="mín. 6 caracteres" required
                  minlength="6">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Tu ubicación — toca el mapa</label>
              <div id="mini-map" class="auth-mini-map"></div>
              <p id="location-info" class="auth-location-info">Toca el mapa para seleccionar tu ubicación</p>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Crear cuenta</button>
          </form>
          <p style="text-align:center;margin-top:16px;font-size:0.8rem;color:var(--text);">
            ¿Ya tienes cuenta?
            <button onclick="switchTab('login')"
              style="background:none;border:none;color:var(--text);cursor:pointer;font-weight:600;">Inicia
              sesión</button>
          </p>
        </div>

      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.getElementById(`${tab}-section`).classList.add('active');
      if (tab === 'register' && typeof miniMap !== 'undefined' && miniMap) {
        setTimeout(() => miniMap.invalidateSize(), 150);
      }
    }
    // Auto-switch if coming from register link
    const params = new URLSearchParams(location.search);
    if (params.get('tab') === 'register') switchTab('register');
    else if (params.get('tab') === 'login') switchTab('login');
  </script>
</body>

</html>
